<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAT BASICO EN TIEMPO REAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --neon-purple: #c026d3;
            --neon-cyan: #22d3ee;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { 
            background: linear-gradient(135deg, #0a0118, #1a0033);
            margin: 0; height: 100vh; overflow: hidden; color: #e0d9ff;
        }

        /* ==================== LOGIN ==================== */
        #login-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10, 2, 25, 0.98);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }

        .login-box {
            background: rgba(20, 10, 45, 0.9);
            backdrop-filter: blur(16px);
            padding: 40px; border-radius: 24px;
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 50px rgba(192, 38, 211, 0.3);
            width: 90%; max-width: 400px; text-align: center;
        }

        .avatar-label {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid var(--neon-purple);
            overflow: hidden; cursor: pointer; margin: 0 auto 20px;
            display: block; position: relative;
        }

        .avatar-label img { width: 100%; height: 100%; object-fit: cover; }

        #input-avatar { display: none; }

        .login-box input {
            width: 100%; padding: 15px; margin: 10px 0;
            border-radius: 12px; border: 1px solid var(--neon-purple);
            background: rgba(255,255,255,0.05); color: white;
        }

        .btn-enter {
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
            color: white; border: none; padding: 15px; width: 100%;
            border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        /* ==================== CHAT ==================== */
        #chat-container {
            display: none; flex-direction: column; height: 100vh;
            max-width: 600px; margin: 0 auto; background: #0f0523;
        }

        #chat-header {
            padding: 20px; background: #1a0b3c; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--neon-purple);
        }

        #messages {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
        }

        .message-wrapper { display: flex; gap: 10px; max-width: 85%; }
        .message-wrapper.outgoing { align-self: flex-end; flex-direction: row-reverse; }

        .user-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--neon-purple); }

        .message {
            padding: 12px; border-radius: 15px; font-size: 0.95rem;
            line-height: 1.4; position: relative;
        }

        .incoming .message { background: #251a44; border-bottom-left-radius: 2px; }
        .outgoing .message { background: var(--neon-purple); border-bottom-right-radius: 2px; }

        .meta { font-size: 0.7rem; margin-bottom: 4px; opacity: 0.8; }
        .outgoing .meta { text-align: right; }

        #form-container { padding: 20px; background: #1a0b3c; }
        .input-row { display: flex; gap: 10px; }
        #input-message { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #251a44; color: white; }
        #btn-send { background: var(--neon-cyan); border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-container">
    <div class="login-box">
        <h2 style="color: var(--neon-cyan)">CHAT BASICO EN TIEMPO REAL</h2>
        <label for="input-avatar" class="avatar-label">
            <img id="avatar-preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </label>
        <input type="file" id="input-avatar" accept="image/*">
        <input type="text" id="input-username" placeholder="Usuario...">
        <button class="btn-enter" id="btn-enter">ENTRAR</button>
    </div>
</div>

<div id="chat-container">
    <div id="chat-header">
        <span>CHAT</span>
        <button id="btn-clear-chat" style="background:red; color:white; border:none; border-radius:5px; padding:5px 10px; cursor:pointer;">Limpiar</button>
    </div>
    <div id="messages"></div>
    <div id="form-container">
        <div class="input-row">
            <input type="text" id="input-message" placeholder="Escribe algo...">
            <button id="btn-send">ENVIAR</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBgRvfFKV1uk16xO-jtChvc_NuVYLoHmGc",
        authDomain: "real-chat-6328f.firebaseapp.com",
        projectId: "real-chat-6328f",
        storageBucket: "real-chat-6328f.firebasestorage.app",
        messagingSenderId: "529382831236",
        appId: "1:529382831236:web:250e5500f5fc8eaf533ed1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messagesRef = collection(db, "messages");

    const userId = Math.random().toString(36).substring(2, 9);
    let username = "Anónimo";
    let userAvatarB64 = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    // Elementos
    const loginContainer = document.getElementById("login-container");
    const chatContainer = document.getElementById("chat-container");
    const inputAvatar = document.getElementById("input-avatar");
    const avatarPreview = document.getElementById("avatar-preview");
    const inputUsername = document.getElementById("input-username");
    const btnEnter = document.getElementById("btn-enter");
    const messagesDiv = document.getElementById("messages");
    const inputMessage = document.getElementById("input-message");
    const btnSend = document.getElementById("btn-send");

    inputAvatar.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = () => { userAvatarB64 = reader.result; avatarPreview.src = reader.result; };
        reader.readAsDataURL(e.target.files[0]);
    };

    btnEnter.onclick = () => {
        if(inputUsername.value.trim()) username = inputUsername.value;
        loginContainer.style.display = "none";
        chatContainer.style.display = "flex";
    };

    async function sendMessage() {
        const text = inputMessage.value.trim();
        if (!text) return;
        inputMessage.value = "";
        
        try {
            await addDoc(messagesRef, {
                text,
                senderId: userId,
                username,
                avatar: userAvatarB64,
                createdAt: serverTimestamp() // Esto causa el delay si no se maneja bien
            });
        } catch (e) { console.error(e); }
    }

    // LA SOLUCIÓN: Usar includeMetadataChanges: true
    const q = query(messagesRef, orderBy("createdAt", "asc"));
    onSnapshot(q, { includeMetadataChanges: true }, (snapshot) => {
        messagesDiv.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            
            // Si el mensaje es nuevo y aún no tiene fecha del servidor, 
            // evitamos que desaparezca ignorando el filtro de orden momentáneamente
            const isMe = data.senderId === userId;
            const wrapper = document.createElement("div");
            wrapper.classList.add("message-wrapper", isMe ? "outgoing" : "incoming");
            
            wrapper.innerHTML = `
                <img src="${data.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="user-avatar">
                <div>
                    <div class="meta">${isMe ? "Tú" : data.username}</div>
                    <div class="message">${data.text}</div>
                </div>
            `;
            messagesDiv.appendChild(wrapper);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }, (error) => {
        console.error("Error en snapshot:", error);
    });

    btnSend.onclick = sendMessage;
    inputMessage.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    document.getElementById("btn-clear-chat").onclick = async () => {
        if(confirm("¿Borrar todo?")) {
            const snap = await getDocs(messagesRef);
            snap.forEach(d => deleteDoc(doc(db, "messages", d.id)));
        }
    };
</script>
</body>
</html>
